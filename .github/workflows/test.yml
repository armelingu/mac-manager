name: Tests

# -----------------------------------------------------------------------------
# The coverage badge refresh at the bottom of this workflow needs a
# Personal Access Token with `gist` scope, stored as the `GIST_SECRET`
# repository secret. One-time setup:
#
#   1. Create a fine-grained PAT at https://github.com/settings/personal-access-tokens/new
#      - Resource owner: armelingu
#      - Repository access: Public Repositories (read-only)
#      - Permissions → Account → "Gists": Read and write
#      - Expiration: pick something you're comfortable rotating (e.g. 90d)
#   2. `gh secret set GIST_SECRET --repo armelingu/mac-manager` (paste the token)
#
# The target gist is:
#   https://gist.github.com/armelingu/4e1e4b488d91a1edec226428792429c7
# and the shields.io badge is wired in README.md.
#
# Without `GIST_SECRET` the workflow still passes — the badge step
# just no-ops because the action silently skips when auth is missing.
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Show interpreter and pytest version
        run: |
          python -V
          pytest --version

      - name: Run pytest (with coverage on Python 3.12 / Ubuntu)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: pytest --cov=macmanager --cov=scripts --cov-report=xml --cov-report=json --cov-report=term-missing

      - name: Run pytest
        if: matrix.python-version != '3.12' || matrix.os != 'ubuntu-latest'
        run: pytest

      - name: Extract coverage percentage
        id: coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          pct=$(python -c 'import json; d=json.load(open("coverage.json")); print(round(d["totals"]["percent_covered"]))')
          echo "percent=$pct" >> "$GITHUB_OUTPUT"
          # Pick a shields-friendly color from the coverage bucket.
          if [ "$pct" -ge 80 ]; then color="brightgreen"
          elif [ "$pct" -ge 60 ]; then color="green"
          elif [ "$pct" -ge 40 ]; then color="yellowgreen"
          elif [ "$pct" -ge 25 ]; then color="yellow"
          else color="red"
          fi
          echo "color=$color" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${pct}% ($color)"

      - name: Upload coverage artifacts
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.xml
            coverage.json
          if-no-files-found: ignore
          retention-days: 14

      # Only refresh the badge on pushes to `main` — PR runs would
      # flicker the number back and forth as branches diverge.
      #
      # `continue-on-error: true` means a missing `GIST_SECRET` (which
      # happens before the PAT is provisioned, and whenever the token
      # expires) only produces a warning instead of failing the whole
      # test matrix. The rest of the job has already validated the
      # build; flipping the gate off because of a badge refresh would
      # be over-reacting.
      - name: Update coverage badge gist
        if: >-
          matrix.python-version == '3.12'
          && matrix.os == 'ubuntu-latest'
          && github.event_name == 'push'
          && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 4e1e4b488d91a1edec226428792429c7
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.percent }}%
          color: ${{ steps.coverage.outputs.color }}
